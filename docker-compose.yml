version: "3.9"

services:
  app:
    container_name: factureflow-app
    image: bilalzouine/factureflow:1.0.1
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.main:create_app
      - FLASK_DEBUG=0
    volumes:
      - app-data:/app/data
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: factureflow-web-server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data: